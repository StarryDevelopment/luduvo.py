name: MkDocs Deploy (release)

permissions:
  contents: write
  
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      name:
        description: "Deploy docs (release)"

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.10.9"

      - name: Install dependencies
        run: |
          pip install mkdocs-material mkdocs-section-index mkdocstrings mkdocstrings-python mkdocs-literate-nav mkdocs-gen-files mkdocs-autorefs mike

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Deploy docs
        run: |
          mike deploy ${{ github.event.release.tag_name }} --push
          mike alias ${{ github.event.release.tag_name }} latest --update-aliases --push
          mike set-default latest --push